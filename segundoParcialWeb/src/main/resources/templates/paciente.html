<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Paciente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="/js/paciente.js"></script>
</head>
<body class="bg-slate-100">
<div class="flex min-h-screen">
    <aside class="w-64 bg-emerald-800 text-white p-5">
        <h2 class="text-2xl font-bold mb-8">PACIENTE</h2>
        <a href="/paciente" class="block py-2 px-2 rounded bg-emerald-900">Mis citas</a>
        <form th:action="@{/logout}" method="post" class="mt-8">
            <button class="w-full text-left py-2 px-2 rounded hover:bg-red-600">Salir</button>
        </form>
    </aside>
    <main class="flex-1 p-8">
        <h1 class="text-3xl font-bold">Mis citas</h1>
        <p class="text-slate-600 mb-6">Bienvenid@, <span th:text="${nombreUsuario}"></span></p>
        <p id="mensaje" class="mb-4 text-sm font-semibold"></p>
        <section class="bg-white rounded-lg shadow p-5 overflow-x-auto">
            <table class="w-full text-sm">
                <thead><tr class="text-left border-b"><th class="py-2">Motivo</th><th>Consultorio</th><th>Fecha</th><th>Horario</th><th>Medico</th><th>Actualizar horario</th></tr></thead>
                <tbody>
                <tr th:each="c : ${consultas}" class="border-b" th:data-id="${c.id}">
                    <td class="py-2" th:text="${c.motivo}"></td>
                    <td th:text="${c.consultorio.numero}"></td>
                    <td><input class="fecha border rounded px-2 py-1" type="date" th:value="${c.fecha}"></td>
                    <td>
                        <input class="inicio border rounded px-2 py-1" type="time" th:value="${c.horaInicio}">
                        <input class="fin border rounded px-2 py-1" type="time" th:value="${c.horaFin}">
                    </td>
                    <td th:text="${c.medico.nombre}"></td>
                    <td><button class="actualizarHorario bg-emerald-700 text-white px-3 py-1 rounded" type="button">Guardar</button></td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
